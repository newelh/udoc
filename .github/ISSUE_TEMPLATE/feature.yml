name: Feature request
description: Suggest a capability or ergonomic improvement.
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What are you trying to do? What is currently in the way? Concrete
        examples beat abstractions.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see? CLI flag, library API, output mode,
        configuration knob — whatever it takes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Workarounds, other libraries, your current approach.
  - type: textarea
    id: extra
    attributes:
      label: Anything else
