# Builds and publishes wheels to PyPI when a `v*` tag is pushed.
# Uses PyPI trusted publishing — no token in repo secrets. Configure the
# project at https://pypi.org/manage/account/publishing/ to trust this
# repo + workflow.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest          # linux x86_64 + aarch64
            cibw_archs: "x86_64 aarch64"
          - os: macos-13               # native Intel
            cibw_archs: "x86_64"
          - os: macos-14               # native Apple Silicon
            cibw_archs: "arm64"
          - os: windows-latest         # native AMD64
            cibw_archs: "AMD64"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install maturin
      - name: Build sdist
        run: maturin sdist --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/udoc
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List dist
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted publishing — no token required.
          packages-dir: dist/

  github-release:
    name: GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
