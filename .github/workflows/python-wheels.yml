# Builds the full PyPI wheel matrix on every push and PR -- same matrix
# as `release.yml` but without the publish step. Acts as a canary so the
# release-day tag push doesn't surface platform-specific build issues for
# the first time.

name: Python wheels

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "python/**"
      - "pyproject.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python-wheels.yml"
  pull_request:
    paths:
      - "crates/**"
      - "python/**"
      - "pyproject.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python-wheels.yml"
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest          # linux x86_64 + aarch64
          - macos-13               # macOS x86_64
          - macos-14               # macOS arm64
          - windows-latest         # windows x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 14

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build sdist
        run: maturin sdist --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 14
