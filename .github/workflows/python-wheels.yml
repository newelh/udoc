# Validates the full PyPI wheel matrix on every PR. The main-branch
# push path is owned by `pages.yml`, which builds the same matrix and
# also publishes wheels to the docs site as a PEP 503 simple index. On
# tag push `release.yml` runs the matrix and publishes to PyPI.

name: Python wheels

on:
  pull_request:
    paths:
      - "crates/**"
      - "python/**"
      - "pyproject.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python-wheels.yml"
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 deliberately excluded; release.yml still covers it on
        # tag push. See pages.yml for the reasoning.
        include:
          - os: ubuntu-latest          # native linux x86_64
            cibw_archs: "x86_64"
          - os: ubuntu-24.04-arm       # native linux aarch64
            cibw_archs: "aarch64"
          - os: macos-14               # native Apple Silicon
            cibw_archs: "arm64"
          - os: windows-latest         # native AMD64
            cibw_archs: "AMD64"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 14

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build sdist
        run: maturin sdist --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 14
