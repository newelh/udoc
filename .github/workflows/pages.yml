# Publishes the docs site at https://newelh.github.io/udoc/, including
# a PEP 503 simple index at /simple/ that lists every wheel built for
# the latest commit. Lets pre-PyPI testers do:
#
#   uv pip install udoc --index-url https://newelh.github.io/udoc/simple/
#
# Wheels live under /wheels/ on the same site; the simple index links
# to them by relative path.

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Each entry uses a runner whose hardware matches the wheel arch
        # so cibuildwheel never cross-compiles or emulates. macos-13
        # (Intel) is intentionally excluded -- its runner queue at GH is
        # frequently 1h+, and Apple has deprecated the architecture.
        # release.yml still builds it on tag push, where the wait is
        # acceptable.
        include:
          - os: ubuntu-latest          # native linux x86_64
            cibw_archs: "x86_64"
          - os: ubuntu-24.04-arm       # native linux aarch64 (no QEMU)
            cibw_archs: "aarch64"
          - os: macos-14               # native Apple Silicon
            cibw_archs: "arm64"
          - os: windows-latest         # native AMD64
            cibw_archs: "AMD64"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 14

  deploy:
    name: Compose and deploy site
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: wheel-artifacts
          pattern: wheels-*
          merge-multiple: true

      - name: Install markdown renderer
        run: python3 -m pip install --upgrade markdown pymdown-extensions pygments

      - name: Compose site (docs + wheels + simple index)
        run: |
          mkdir -p _site/wheels _site/simple/udoc
          # Wheels at /wheels/<filename>.
          cp wheel-artifacts/*.whl _site/wheels/ 2>/dev/null || true
          # Disable Jekyll processing (we ship pre-rendered HTML).
          touch _site/.nojekyll
          python3 - <<'PY'
          import html, pathlib, re
          import markdown

          REPO_ROOT = pathlib.Path('.')
          SITE = pathlib.Path('_site')

          CSS = '''
          body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                 max-width: 760px; margin: 2.5rem auto; padding: 0 1.5rem;
                 line-height: 1.55; color: #1a1a1a; }
          h1, h2, h3 { line-height: 1.25; }
          h1 { border-bottom: 1px solid #ddd; padding-bottom: .3rem; }
          a { color: #0a58ca; text-decoration: none; }
          a:hover { text-decoration: underline; }
          pre { background: #101010; color: #e8e8e8; padding: 1rem; border-radius: 6px;
                overflow-x: auto; font-size: .9rem; }
          code { background: #f0f0f0; padding: .1rem .3rem; border-radius: 3px;
                 font-size: .9em; }
          pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
          table { border-collapse: collapse; }
          th, td { padding: .4rem .8rem; border-bottom: 1px solid #ddd; text-align: left; }
          .nav { color: #666; font-size: .9rem; margin-bottom: 2rem; }
          '''.strip()

          PAGE_TPL = '''<!DOCTYPE html>
          <html lang="en"><head>
          <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>{title} -- udoc</title>
          <style>{css}</style>
          </head><body>
          <div class="nav"><a href="/udoc/">&larr; udoc home</a></div>
          {body}
          </body></html>
          '''

          def render(md_text, title):
              md = markdown.Markdown(extensions=[
                  'fenced_code', 'tables', 'toc',
                  'pymdownx.superfences', 'pymdownx.highlight',
              ])
              body = md.convert(md_text)
              # Rewrite *.md links to *.html so pages link to each other on the site.
              body = re.sub(r'href="([^"]+?)\.md(#[^"]*)?"',
                            lambda m: f'href="{m.group(1)}.html{m.group(2) or ""}"',
                            body)
              return PAGE_TPL.format(title=html.escape(title), css=CSS, body=body)

          # Homepage: render README.md
          readme_md = (REPO_ROOT / 'README.md').read_text()
          (SITE / 'index.html').write_text(render(readme_md, 'udoc'))
          print('Rendered: index.html (from README.md)')

          # Each docs/*.md -> _site/<name>.html
          for md_path in sorted((REPO_ROOT / 'docs').rglob('*.md')):
              rel = md_path.relative_to(REPO_ROOT / 'docs')
              out = SITE / rel.with_suffix('.html')
              out.parent.mkdir(parents=True, exist_ok=True)
              title = rel.stem.replace('-', ' ').replace('_', ' ').title()
              out.write_text(render(md_path.read_text(), title))
              print(f'Rendered: {out.relative_to(SITE)}')

          # PEP 503 simple index. The href path is relative to /simple/udoc/.
          wheels_dir = SITE / 'wheels'
          wheels = sorted(p.name for p in wheels_dir.iterdir() if p.suffix == '.whl') \
              if wheels_dir.exists() else []
          udoc_idx = SITE / 'simple' / 'udoc' / 'index.html'
          udoc_idx.parent.mkdir(parents=True, exist_ok=True)
          lines = [
              '<!DOCTYPE html>',
              '<html><head>',
              '  <meta name="pypi:repository-version" content="1.0">',
              '  <title>udoc</title>',
              '</head><body>',
              '  <h1>udoc</h1>',
          ]
          for w in wheels:
              esc = html.escape(w)
              lines.append(f'  <a href="../../wheels/{esc}">{esc}</a><br>')
          lines.append('</body></html>')
          udoc_idx.write_text('\n'.join(lines) + '\n')

          # Top-level simple/index.html lists projects.
          top = SITE / 'simple' / 'index.html'
          top.write_text(
              '<!DOCTYPE html>\n<html><body>\n'
              '  <a href="udoc/">udoc</a>\n'
              '</body></html>\n'
          )
          print(f'Indexed {len(wheels)} wheels:')
          for w in wheels:
              print(f'  {w}')
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
