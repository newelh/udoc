# Publishes the docs site at https://newelh.github.io/udoc/, including
# a PEP 503 simple index at /simple/ that lists every wheel built for
# the latest commit. Lets pre-PyPI testers do:
#
#   uv pip install udoc --index-url https://newelh.github.io/udoc/simple/
#
# Wheels live under /wheels/ on the same site; the simple index links
# to them by relative path.

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Each entry uses a runner whose hardware matches the wheel arch
        # so cibuildwheel never cross-compiles or emulates. macos-13
        # (Intel) is intentionally excluded -- its runner queue at GH is
        # frequently 1h+, and Apple has deprecated the architecture.
        # release.yml still builds it on tag push, where the wait is
        # acceptable.
        include:
          - os: ubuntu-latest          # native linux x86_64
            cibw_archs: "x86_64"
          - os: ubuntu-24.04-arm       # native linux aarch64 (no QEMU)
            cibw_archs: "aarch64"
          - os: macos-14               # native Apple Silicon
            cibw_archs: "arm64"
          - os: windows-latest         # native AMD64
            cibw_archs: "AMD64"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_LINUX: ${{ matrix.cibw_archs }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cibw_archs }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 14

  deploy:
    name: Compose and deploy site
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: wheel-artifacts
          pattern: wheels-*
          merge-multiple: true

      - name: Install mkdocs-material
        run: python3 -m pip install --upgrade mkdocs-material

      - name: Build docs site with mkdocs
        run: |
          # The README is the homepage. mkdocs reads docs/index.md;
          # the README's repo-relative links (`docs/cli.md`,
          # `SECURITY.md`, `LICENSE-APACHE`...) 404 on the rendered
          # docs site, so the rewriter rebases them to docs-relative
          # form before mkdocs sees them. Build is `--strict` so any
          # surviving broken link fails CI loudly.
          python3 scripts/render-readme-as-docs-index.py \
            < README.md \
            > docs/index.md
          mkdocs build --strict --site-dir _site/
          rm docs/index.md

      - name: Add wheels and PEP 503 simple index
        run: |
          mkdir -p _site/wheels _site/simple/udoc
          cp wheel-artifacts/*.whl _site/wheels/ 2>/dev/null || true
          # Disable Jekyll processing (the artifact is already complete).
          touch _site/.nojekyll
          python3 - <<'PY'
          import html, pathlib

          SITE = pathlib.Path('_site')
          wheels_dir = SITE / 'wheels'
          wheels = sorted(p.name for p in wheels_dir.iterdir() if p.suffix == '.whl') \
              if wheels_dir.exists() else []

          # PEP 503 per-project index. Hrefs are relative to /simple/udoc/.
          udoc_idx = SITE / 'simple' / 'udoc' / 'index.html'
          udoc_idx.parent.mkdir(parents=True, exist_ok=True)
          lines = [
              '<!DOCTYPE html>',
              '<html><head>',
              '  <meta name="pypi:repository-version" content="1.0">',
              '  <title>udoc</title>',
              '</head><body>',
              '  <h1>udoc</h1>',
          ]
          for w in wheels:
              esc = html.escape(w)
              lines.append(f'  <a href="../../wheels/{esc}">{esc}</a><br>')
          lines.append('</body></html>')
          udoc_idx.write_text('\n'.join(lines) + '\n')

          # Top-level simple/ root.
          top = SITE / 'simple' / 'index.html'
          top.write_text(
              '<!DOCTYPE html>\n<html><body>\n'
              '  <a href="udoc/">udoc</a>\n'
              '</body></html>\n'
          )
          print(f'Indexed {len(wheels)} wheels:')
          for w in wheels:
              print(f'  {w}')
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
